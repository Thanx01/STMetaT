<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">STMetaT model architecture</title>
  <desc id="desc">Spatio-temporal constraint sampling, multi-view local encoding, and meta-learning with spatio-temporal heterogeneity fusion.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.18" />
    </filter>
    <style>
      .panel { stroke: #333; stroke-width: 2; filter: url(#shadow); }
      .title { font-family: Georgia, 'Times New Roman', serif; font-size: 28px; font-weight: 700; fill: #111; }
      .label { font-family: Georgia, 'Times New Roman', serif; font-size: 22px; fill: #111; }
      .small { font-family: Georgia, 'Times New Roman', serif; font-size: 17px; fill: #111; }
      .arrow { stroke: #222; stroke-width: 3; marker-end: url(#arrow); fill: none; }
      .dash { stroke: #222; stroke-width: 2; stroke-dasharray: 12 10; fill: none; }
      .matrix { stroke: #8a6666; stroke-width: 1; fill: none; }
      .traj { stroke: #111; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .node { stroke: #111; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="520" fill="#ffffff" />

